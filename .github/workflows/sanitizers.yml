name: Sanitizers

on:
  workflow_dispatch:

jobs:
  build-and-test:
    name: precheck / ${{ matrix.os }} / ${{ matrix.compiler }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            compiler: gcc
            cc: gcc
            cxx: g++
          - os: ubuntu-latest
            compiler: clang
            cc: clang
            cxx: clang++
          - os: macos-latest
            compiler: clang
            cc: clang
            cxx: clang++
          - os: macos-latest
            compiler: gcc
            cc: gcc
            cxx: g++

    env:
      CC: ${{ matrix.cc }}
      CXX: ${{ matrix.cxx }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup CMake
        uses: jwlawson/actions-setup-cmake@v2
        with:
          cmake-version: "4.2.x"

      - name: Install Linux compilers
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          if [ "${{ matrix.compiler }}" = "gcc" ]; then
            sudo apt-get install -y g++ libeigen3-dev
          else
            sudo apt-get install -y clang libeigen3-dev
          fi

      - name: Install Homebrew GCC
        if: runner.os == 'macOS' && matrix.compiler == 'gcc'
        run: brew install gcc

      - name: Install Homebrew Eigen
        if: runner.os == 'macOS'
        run: brew install eigen

      - name: Select Homebrew GCC binaries
        if: runner.os == 'macOS' && matrix.compiler == 'gcc'
        run: |
          GCC_BIN=$(ls -1 /opt/homebrew/bin/gcc-* /usr/local/bin/gcc-* 2>/dev/null | grep -E 'gcc-[0-9]+$' | sort -V | tail -n1)
          GXX_BIN="${GCC_BIN/gcc-/g++-}"
          echo "CC=$GCC_BIN" >> "$GITHUB_ENV"
          echo "CXX=$GXX_BIN" >> "$GITHUB_ENV"

      - name: Toolchain info
        run: |
          cmake --version
          "$CC" --version
          "$CXX" --version

      - name: Configure
        run: >
          cmake -S . -B build
          -DCMAKE_BUILD_TYPE=Release
          -DTAX_BUILD_BENCH=OFF
          -DTAX_ENABLE_EIGEN=ON

      - name: Build
        run: cmake --build build -j 2

      - name: Test
        run: ctest --test-dir build --output-on-failure

  sanitizers:
    name: sanitizer / ${{ matrix.sanitizer }}
    needs: build-and-test
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - sanitizer: asan
            flags: -fsanitize=address -fno-omit-frame-pointer -O1 -g
          - sanitizer: ubsan
            flags: -fsanitize=undefined -fno-omit-frame-pointer -O1 -g
          - sanitizer: tsan
            flags: -fsanitize=thread -fno-omit-frame-pointer -O1 -g

    env:
      CC: clang
      CXX: clang++

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup CMake
        uses: jwlawson/actions-setup-cmake@v2
        with:
          cmake-version: "4.2.x"

      - name: Install clang
        run: |
          sudo apt-get update
          sudo apt-get install -y clang libeigen3-dev

      - name: Toolchain info
        run: |
          cmake --version
          "$CC" --version
          "$CXX" --version

      - name: Configure
        run: >
          cmake -S . -B build-${{ matrix.sanitizer }}
          -DCMAKE_BUILD_TYPE=RelWithDebInfo
          -DTAX_BUILD_BENCH=OFF
          -DCMAKE_CXX_FLAGS="${{ matrix.flags }}"
          -DCMAKE_EXE_LINKER_FLAGS="${{ matrix.flags }}"

      - name: Build
        run: cmake --build build-${{ matrix.sanitizer }} -j 2

      - name: Test
        run: ctest --test-dir build-${{ matrix.sanitizer }} --output-on-failure
