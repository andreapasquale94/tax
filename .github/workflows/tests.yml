name: Tests

on:
  push:
  pull_request:
  workflow_dispatch:

jobs:
  build-and-test:
    name: ${{ matrix.os }} / ${{ matrix.compiler }} / eigen-${{ matrix.eigen_version }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest]
        compiler: [gcc, clang]
        eigen_version: ["3.4.0", "5.0.0"]
        include:
          - os: ubuntu-latest
            compiler: gcc
            cc: gcc
            cxx: g++
          - os: ubuntu-latest
            compiler: clang
            cc: clang
            cxx: clang++
          - os: macos-latest
            compiler: clang
            cc: clang
            cxx: clang++
          - os: macos-latest
            compiler: gcc
            cc: gcc
            cxx: g++

    env:
      CC: ${{ matrix.cc }}
      CXX: ${{ matrix.cxx }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup CMake
        uses: jwlawson/actions-setup-cmake@v2
        with:
          cmake-version: "4.2.x"

      - name: Install Linux compilers
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          if [ "${{ matrix.compiler }}" = "gcc" ]; then
            sudo apt-get install -y g++
          else
            sudo apt-get install -y clang
          fi

      - name: Install Homebrew GCC
        if: runner.os == 'macOS' && matrix.compiler == 'gcc'
        run: brew install gcc

      - name: Select Homebrew GCC binaries
        if: runner.os == 'macOS' && matrix.compiler == 'gcc'
        run: |
          GCC_BIN=$(ls -1 /opt/homebrew/bin/gcc-* /usr/local/bin/gcc-* 2>/dev/null | grep -E 'gcc-[0-9]+$' | sort -V | tail -n1)
          GXX_BIN="${GCC_BIN/gcc-/g++-}"
          echo "CC=$GCC_BIN" >> "$GITHUB_ENV"
          echo "CXX=$GXX_BIN" >> "$GITHUB_ENV"

      - name: Toolchain info
        run: |
          cmake --version
          "$CC" --version
          "$CXX" --version

      - name: Install Eigen ${{ matrix.eigen_version }}
        run: bash tools/install_eigen.sh ${{ matrix.eigen_version }}

      - name: Configure
        run: >
          cmake -S . -B build
          -DCMAKE_BUILD_TYPE=Release
          -DTAX_BUILD_BENCH=OFF
          -DTAX_ENABLE_EIGEN=ON

      - name: Build
        run: cmake --build build -j 2

      - name: Test
        run: ctest --test-dir build --output-on-failure
